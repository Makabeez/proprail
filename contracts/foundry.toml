[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.22"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[lint]
exclude_lints = ["screaming-snake-case-immutable"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
